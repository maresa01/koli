<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE6FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="130" x2="372" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6B4CE6"/>
      <stop offset="1" stop-color="#8EEEB9"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1E1B4B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="384" height="384" rx="72" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="92" y="92" width="328" height="328" rx="56" fill="#FFFFFF" fill-opacity="0.72" stroke="#6B4CE6" stroke-opacity="0.18" stroke-width="6"/>

  <!-- 3x3 grid -->
  <g transform="translate(132 132)">
    <rect x="0" y="0" width="248" height="248" rx="40" fill="#FFFFFF" fill-opacity="0.35" stroke="#1E1B4B" stroke-opacity="0.10" stroke-width="6"/>
    <g stroke="#1E1B4B" stroke-opacity="0.10" stroke-width="6">
      <path d="M82.6667 0V248"/>
      <path d="M165.333 0V248"/>
      <path d="M0 82.6667H248"/>
      <path d="M0 165.333H248"/>
    </g>

    <!-- highlight "next number" cell -->
    <rect x="0" y="0" width="82.6667" height="82.6667" rx="26" fill="url(#accent)" fill-opacity="0.18"/>
    <rect x="0" y="0" width="82.6667" height="82.6667" rx="26" stroke="#6B4CE6" stroke-opacity="0.45" stroke-width="6"/>

    <!-- numbers -->
    <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="900" font-size="34" fill="#1E1B4B" fill-opacity="0.78">
      <text x="28" y="52">1</text>
      <text x="112" y="52">2</text>
      <text x="194" y="52">3</text>
      <text x="28" y="134">4</text>
      <text x="112" y="134">5</text>
      <text x="194" y="134">6</text>
      <text x="28" y="216">7</text>
      <text x="112" y="216">8</text>
      <text x="194" y="216">9</text>
    </g>
  </g>
</svg>

